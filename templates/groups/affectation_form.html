{% extends "base.html" %}
{% block title %}Affectation groupe{% endblock %}
{% block content %}
<h2 class="mb-3">{% if object %}Modifier{% else %}Creer{% endif %} une affectation groupe -> encadrant</h2>
<form method="post" class="card">
    <div class="card-body">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary">Enregistrer</button>
        <a href="{% url 'service_group_list' %}" class="btn btn-secondary">Retour</a>
    </div>
</form>
{% endblock %}
