{% extends "base.html" %}
{% block title %}Commentaire enseignant{% endblock %}
{% block content %}
<h2 class="mb-3">Commenter la demande #{{ demande.pk }}</h2>
<form method="post" class="card">
    <div class="card-body">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary">Enregistrer commentaire</button>
        <a href="{% url 'demande_detail' demande.pk %}" class="btn btn-secondary">Annuler</a>
    </div>
</form>
{% endblock %}
