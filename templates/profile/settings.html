{% extends "base.html" %}
{% block title %}Profil & Parametres{% endblock %}
{% block content %}
<h2 class="mb-4">Profil & Parametres</h2>

<div class="row g-3">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header">Mes informations</div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" value="{{ request.user.username }}" disabled>
                </div>
                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <input type="text" class="form-control" value="{{ request.user.get_role_display }}" disabled>
                </div>
                <form method="post">
                    {% csrf_token %}
                    {{ profile_form.as_p }}
                    <button class="btn btn-primary" type="submit" name="update_profile" value="1">Mettre a jour le profil</button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-lg-6">
        <div class="card">
            <div class="card-header">Modifier le mot de passe</div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ password_form.as_p }}
                    <button class="btn btn-outline-primary" type="submit" name="change_password" value="1">Changer le mot de passe</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
